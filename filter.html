<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img {
            width: 300px;


        }

        .img1 {
            filter: blur(3px);
        }

        .img2 {
            filter: hue-rotate(90deg);
        }

        .img3 {
            filter: drop-shadow(6px 16px 20px red) invert(6%);
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="img1"
            src="https://images.hindustantimes.com/img/2022/11/12/550x309/akshay_kumar_1659860706633_1668255913307_1668255913307.jpg"
            alt="">
        <img class="img2"
            src="https://upload.wikimedia.org/wikipedia/commons/b/b6/Image_created_with_a_mobile_phone.png">
        <img class="img3"
            src="https://upload.wikimedia.org/wikipedia/commons/b/b6/Image_created_with_a_mobile_phone.png">

    </div>

</body>

</html>
